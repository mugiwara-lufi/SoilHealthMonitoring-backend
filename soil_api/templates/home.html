<!DOCTYPE html>
<html>
<head>
    <title>Soil Health Monitoring</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f7f6; }
        .container { background: white; padding: 2rem; border-radius: 8px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2e7d32; }
        .button-group { margin-top: 20px; }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            text-decoration: none;
            color: white;
            background-color: #4caf50;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Soil Health Monitoring System</h1>
        <p>Welcome! Please select an option below to manage your farm plots.</p>
        <div class="button-group">
            <a href="/api/register/" class="btn">Register</a>
            <a href="/api/auth/login/" class="btn">Login</a>
            <a href="/api/plots/" class="btn">View Plots</a>
        </div>
    </div>

</html>
